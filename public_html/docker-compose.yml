version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: dpadmin-app
    container_name: dpadmin_app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - dpadmin-network

  web:
    image: nginx:alpine
    container_name: dpadmin_web
    restart: unless-stopped
    tty: true
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
    networks:
      - dpadmin-network
    depends_on:
      - app

  db:
    image: mysql:5.7
    container_name: dpadmin_db
    restart: unless-stopped
    tty: true
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-dpadmin}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-dpadmin}
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - dpadmin-network

networks:
  dpadmin-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
